<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DEAR ERP 登入</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel">
      <h1 class="h3 mb-1">DEAR ERP</h1>
      <p class="text-secondary mb-4">請登入管理系統</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label">帳號</label>
          <input class="form-control" name="username" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">密碼</label>
          <input class="form-control" name="password" type="password" required>
        </div>
        <button class="btn btn-dark w-100" type="submit">登入</button>
      </form>
      <div class="small text-secondary mt-3">預設帳號：admin / admin123</div>
    </section>
  </main>
</body>
</html>
