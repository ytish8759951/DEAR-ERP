{% extends "base.html" %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4">
  <h1 class="h3 mb-0">客戶列表</h1>
  <form method="get" class="d-flex align-items-center gap-2">
    <label class="form-label mb-0">每頁</label>
    <select class="form-select form-select-sm" name="per_page" onchange="this.form.submit()">
      {% for size in page_size_options %}
        <option value="{{ size }}" {% if pagination.per_page == size %}selected{% endif %}>{{ size }}</option>
      {% endfor %}
    </select>
  </form>
</div>
<div class="table-responsive">
  <table class="table table-hover align-middle bg-white">
    <thead class="table-light"><tr><th>客戶名稱</th><th>電話</th><th>LINE</th><th>建立時間</th></tr></thead>
    <tbody>
      {% for customer in customers %}
      <tr><td>{{ customer.name }}</td><td>{{ customer.phone or "-" }}</td><td>{{ customer.line or "-" }}</td><td>{{ customer.created_at }}</td></tr>
      {% else %}
      <tr><td colspan="4" class="text-center text-secondary py-5">尚無客戶資料</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% include "operations/_pagination.html" %}
{% endblock %}
